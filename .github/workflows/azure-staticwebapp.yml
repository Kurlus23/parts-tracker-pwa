name: Deploy PWApp with Static Web Apps (Preview - No Token Needed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: apps/web
        run: |
          corepack enable
          pnpm install --frozen-lockfile || npm ci

      - name: Build
        working-directory: apps/web
        run: pnpm run build || npm run build

      - name: Deploy to Static Web Apps (Preview)
        uses: Azure/static-web-apps-deploy@preview
        with:
          app_location: "apps/web"
          output_location: "dist"
